# Koyeb 部署配置：在 Koyeb 网页「从 GitHub 导入」本仓库时会自动读取本文件
# 作用：预置构建/启动命令、端口、健康检查，让您几乎零配置即可部署
# 注意：数据库（Postgres）请在网页创建 App 时通过「Add a database」添加，
#       Koyeb 会自动把连接串注入为环境变量 DATABASE_URL，代码会自动使用它。

name: hr-talent-system
type: web

git:
  repository: github.com/Tongcan-Xu/hr-talent-system
  branch: main

# 构建与运行（对应本项目的 package.json: start = node server.js）
build_command: npm install
run_command: npm start

# 服务端口与健康检查（首页 / 返回 200）
ports:
  - port: 3000
    protocol: http

health_checks:
  - type: http
    port: 3000
    path: /

# 基础环境变量（公司密钥与管理员密码；部署后建议改为只有内部知道的）
env:
  - key: NODE_ENV
    value: production
  - key: COMPANY_KEY
    value: hualian2026
  - key: ADMIN_PASSWORD
    value: admin123
